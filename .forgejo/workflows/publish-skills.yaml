name: Publish Agent Skill (APM)

on:
  push:
    branches: [master]
    paths:
      - 'apm.yml'
      - '.apm/**'
      - '.forgejo/workflows/publish-skills.yaml'
      - 'version'
  workflow_dispatch:

jobs:
  publish:
    runs-on: docker
    container:
      image: node:22

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Increment Build Number
        id: build
        uses: https://forgejo.aleisium.com/aleisium/actions/repo-var@master
        with:
          operation: increment
          name: VERSION_BUILD
          token: ${{ secrets.REPOSITORY_WRITE }}

      - name: Tag and push
        run: |
          TAG="v$(npx @aleisium/modver show --style semver)"
          echo "Tagging ${TAG}"
          git config user.email "ci@forgejo.aleisium.com"
          git config user.name "Forgejo CI"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
