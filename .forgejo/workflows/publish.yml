name: Publish Packages

on:
  push:
    branches: [master]
    paths:
      - 'als-tickets-cli/**'
      - '.forgejo/workflows/publish.yml'
      - 'version'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: docker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure npm for Forgejo package registry
        run: |
          npm config set "//forgejo.aleisium.com/api/packages/aleisium/npm/:_authToken" "${{ secrets.NPM_TOKEN }}"

      - name: Increment Build Number
        id: build
        uses: https://forgejo.aleisium.com/aleisium/actions/repo-var@master
        with:
          operation: increment
          name: VERSION_BUILD
          token: ${{ secrets.REPOSITORY_WRITE }}

      - name: Render Version and Publish
        working-directory: als-tickets-cli/als-tickets-cli-main
        run: |
          set -x

          PACKAGE_NAME=$(node -p "require('./package.json').name")

          npx @aleisium/modver packagejson --style semver

          VERSION="$(npx @aleisium/modver show --style semver)"
          BUILD="${{ steps.build.outputs.current }}"
          echo "Package: ${PACKAGE_NAME}"
          echo "Version: ${VERSION} (build: ${BUILD})"

          npm publish --fetch-retries=0
